<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mass-Spring-Dashpot Sandbox</title>
<style>
  body {
    font-family: sans-serif;
    background: #1e1e1e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { font-size: 1.3em; }
  canvas {
    background: #111;
    border: 1px solid #444;
  }
  .controls {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin: 15px 0;
  }
  .controls label {
    display: flex;
    flex-direction: column;
    font-size: 0.85em;
  }
  .controls input {
    width: 80px;
  }
  .buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
  button {
    padding: 8px 16px;
    font-size: 1em;
    cursor: pointer;
  }
  .dashboard {
    display: flex;
    gap: 30px;
    font-size: 0.95em;
    margin-top: 10px;
  }
  .dashboard span {
    font-weight: bold;
    color: #6cf;
  }
</style>
</head>
<body>

<h1>Hello, Mass-Spring-Dashpot!</h1>

<canvas id="canvas" width="400" height="400"></canvas>

<div class="buttons">
  <button id="startBtn">Start</button>
  <button id="stopBtn">Stop</button>
  <button id="resetBtn">Reset</button>
</div>

<div class="controls">
  <label>Mass (kg)
    <input type="number" id="mass" value="1" step="0.1" min="0.1">
  </label>
  <label>Spring k (N/m)
    <input type="number" id="stiffness" value="20" step="1" min="0">
  </label>
  <label>Damping c (Ns/m)
    <input type="number" id="damping" value="0.5" step="0.1" min="0">
  </label>
  <label>Rest length (px)
    <input type="number" id="length" value="150" step="5" min="10">
  </label>
</div>

<div class="dashboard">
  <div>Position: <span id="posOut">0.00</span> px</div>
  <div>Velocity: <span id="velOut">0.00</span> px/s</div>
  <div>Time: <span id="timeOut">0.00</span> s</div>
</div>

<script src="script.js"></script>
</body>
</html>
